services:
  postgres:
    image: postgres:16-alpine
    container_name: clockup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clockup
    ports:
      - "5432:5432"
    volumes:
      - clockup_pgdata:/var/lib/postgresql/data

volumes:
  clockup_pgdata:
